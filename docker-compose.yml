services:
  app:
    build: .
    image: imvickykumar999/insta-loop-live:latest
    container_name: insta-loop-live
    ports:
      - "3000:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./ig_stream_config.json:/app/ig_stream_config.json
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
    user: "1000:1000"
    restart: unless-stopped
