server_names_hash_bucket_size 128;

upstream insta_app {
    server app:5000;
}

server {
    listen 80;
    server_name insta.24x7stream.shop www.insta.24x7stream.shop;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name insta.24x7stream.shop www.insta.24x7stream.shop;

    # SSL certificates (update paths as needed for Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/insta.24x7stream.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insta.24x7stream.shop/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy settings
    client_max_body_size 2G;

    location / {
        proxy_pass http://insta_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

